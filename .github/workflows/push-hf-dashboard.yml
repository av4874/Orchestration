name: Push HF Space Dashboard

on:
  push:
    branches: [master]
    paths:
      - 'results/**'
      - 'agent_workspace/**'
  workflow_dispatch:
    inputs:
      round:
        description: 'Round number'
        required: false
        default: ''

jobs:
  push-dashboard:
    name: Update HF Space Status
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Detect round number
        id: set-round
        run: |
          if [ -n "${{ github.event.inputs.round }}" ]; then
            ROUND="${{ github.event.inputs.round }}"
          else
            ROUND=$(python -c "
          import json, os
          mem_path = 'pipeline/attack_memory.json'
          if os.path.exists(mem_path):
              m = json.load(open(mem_path))
              rounds = m.get('rounds', [])
              print(rounds[-1]['round'] if rounds else 1)
          else:
              print(1)
          ")
          fi
          echo "round=$ROUND" >> $GITHUB_OUTPUT
          echo "Round: $ROUND"

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ENTERPRISE_ROOT: ${{ github.workspace }}
        run: python pipeline/push_space_status.py --round ${{ steps.set-round.outputs.round }}
