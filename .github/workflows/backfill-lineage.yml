name: Backfill model_lineage.json for past rounds

on:
  workflow_dispatch:
    inputs:
      round:
        description: 'Round number to backfill'
        required: true
        default: '1'

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Download round results from HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os, json
          from huggingface_hub import hf_hub_download
          from pathlib import Path

          token = os.environ["HF_TOKEN"]
          ROUND = "${{ github.event.inputs.round }}"
          files = [
              "results/retrain_report.json",
              "results/pipeline_decision.json",
              "results/evasion_report.json",
          ]
          for f in files:
              try:
                  p = hf_hub_download(
                      "Builder117/enterprise-adversarial-samples", f,
                      repo_type="dataset", token=token,
                  )
                  dest = Path(f)
                  dest.parent.mkdir(parents=True, exist_ok=True)
                  dest.write_bytes(Path(p).read_bytes())
                  print(f"Downloaded {f}")
              except Exception as e:
                  print(f"SKIP {f}: {e}")
          EOF

      - name: Push lineage + status to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python pipeline/push_space_status.py --round ${{ github.event.inputs.round }}
