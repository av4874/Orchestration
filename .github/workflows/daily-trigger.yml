name: Daily Attack Round Trigger

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:        # manual trigger

jobs:
  trigger-attack-generation:
    name: Trigger Attack Generation Workflow
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine next round
        id: round
        run: |
          ROUND=$(python -c "
          import json, os
          mem_path = 'pipeline/attack_memory.json'
          if os.path.exists(mem_path):
              m = json.load(open(mem_path))
              print(len(m.get('rounds', [])) + 1)
          else:
              print(1)
          ")
          echo "round=$ROUND" >> $GITHUB_OUTPUT
          echo "Next round: $ROUND"

      - name: Create attacks branch and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ROUND=${{ steps.round.outputs.round }}
          DATE=$(date -u +%Y%m%d)
          BRANCH="attacks/daily-round-${ROUND}-${DATE}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Append to trigger log so push has a real commit
          mkdir -p .github
          echo "${BRANCH} $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> .github/daily_trigger.log
          git add .github/daily_trigger.log
          git commit -m "chore: daily trigger round ${ROUND} [${DATE}]"
          git push origin "$BRANCH"
          echo "Branch pushed: $BRANCH — attack-generate.yml will trigger automatically"
