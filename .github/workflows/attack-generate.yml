name: Adversarial Attack Generation

on:
  push:
    branches:
      - 'attacks/**'
  workflow_dispatch:
    inputs:
      round:
        description: 'Round number (leave blank for auto)'
        required: false
        default: ''

jobs:
  agent-attack-cycle:
    name: Run Red + Blue Team Agents
    runs-on: ubuntu-latest
    outputs:
      round: ${{ steps.set-round.outputs.round }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine round number
        id: set-round
        run: |
          if [ -n "${{ github.event.inputs.round }}" ]; then
            ROUND="${{ github.event.inputs.round }}"
          else
            ROUND=$(python -c "
          import json, os
          mem_path = 'pipeline/attack_memory.json'
          if os.path.exists(mem_path):
              m = json.load(open(mem_path))
              ROUND = len(m.get('rounds', [])) + 1
          else:
              ROUND = 1
          print(ROUND)
          ")
          fi
          echo "round=$ROUND" >> $GITHUB_OUTPUT
          echo "Round: $ROUND"

      - name: Run Red Team Agent
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADVERSARIAL_DATASET: Builder117/enterprise-adversarial-samples
          ENTERPRISE_ROOT: ${{ github.workspace }}
        run: python agents/red_team_agent.py --round ${{ steps.set-round.outputs.round }} --dry-run

      - name: Run Blue Team Agent
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADVERSARIAL_DATASET: Builder117/enterprise-adversarial-samples
          ENTERPRISE_ROOT: ${{ github.workspace }}
        run: python agents/blue_team_agent.py --round ${{ steps.set-round.outputs.round }} --dry-run

      - name: Validate attack sample schema
        run: |
          python -c "
          import json, jsonschema, sys, os
          round_num = ${{ steps.set-round.outputs.round }}
          samples_path = f'results/round_{round_num}_samples.json'
          if not os.path.exists(samples_path):
              print(f'ERROR: {samples_path} not found')
              sys.exit(1)
          samples = json.load(open(samples_path))
          schema = {
              'type': 'array',
              'items': {
                  'type': 'object',
                  'required': ['id', 'detector', 'prompt', 'attack_family', 'expected_evasion'],
                  'properties': {
                      'detector': {'type': 'string', 'enum': ['injection','jailbreak','insecure_output','indirect_injection']},
                      'expected_evasion': {'type': 'boolean'},
                  }
              }
          }
          jsonschema.validate(samples, schema)
          families = list(set(s['attack_family'] for s in samples))
          print(f'VALID: {samples_path} ({len(samples)} samples, families: {families})')
          "

      - name: Generate scorecard
        env:
          ENTERPRISE_ROOT: ${{ github.workspace }}
        run: |
          python reporting/scorecard.py \
            --round ${{ steps.set-round.outputs.round }} \
            --output results/scorecard.html

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: round-${{ steps.set-round.outputs.round }}-attack-artifacts
          path: |
            results/round_${{ steps.set-round.outputs.round }}_samples.json
            results/scorecard.html
            agent_workspace/
            agent_traces/
          retention-days: 30

  open-pr:
    name: Open Pull Request with Agent Report
    runs-on: ubuntu-latest
    needs: agent-attack-cycle
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: round-${{ needs.agent-attack-cycle.outputs.round }}-attack-artifacts
          path: downloaded/

      - name: Build PR body from agent traces
        id: pr-body
        env:
          ROUND: ${{ needs.agent-attack-cycle.outputs.round }}
        run: |
          python - <<'PYEOF'
          import json, os, sys

          round_num = int(os.environ["ROUND"])
          base = "downloaded"

          body = f"## Adversarial Round {round_num} — Agent Report\n\n"
          body += f"**Triggered by:** `{os.environ.get('GITHUB_ACTOR', 'scheduler')}`\n\n"

          for agent in ["red_team", "blue_team"]:
              trace_path = f"{base}/agent_traces/round_{round_num}_{agent}.json"
              if os.path.exists(trace_path):
                  t = json.load(open(trace_path))
                  steps = t.get("steps", [])
                  tools_called = [s["tool"] for s in steps if "tool" in s]
                  body += f"### {agent.replace('_', ' ').title()} Agent\n"
                  body += f"- Tools called: `{tools_called}`\n"
                  body += f"- Summary: {str(t.get('final_output', 'N/A'))[:300]}\n\n"
              else:
                  body += f"### {agent.replace('_', ' ').title()} Agent\n- trace not found\n\n"

          samples_path = f"{base}/results/round_{round_num}_samples.json"
          if os.path.exists(samples_path):
              samples = json.load(open(samples_path))
              families = list(set(s.get("attack_family", "?") for s in samples))
              detectors = list(set(s.get("detector", "?") for s in samples))
              body += f"### Samples Generated\n"
              body += f"- Total: **{len(samples)}**\n"
              body += f"- Attack families: `{families}`\n"
              body += f"- Detectors targeted: `{detectors}`\n\n"

          body += "---\n*Merge to `main` to trigger Jenkins Phase 2 (attack execution + orchestrator).*\n"

          with open("/tmp/pr_body.md", "w") as f:
              f.write(body)
          print("PR body written.")
          PYEOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: round-${{ needs.agent-attack-cycle.outputs.round }} attack samples"
          branch: attacks/round-${{ needs.agent-attack-cycle.outputs.round }}-samples
          base: master
          title: "[Round ${{ needs.agent-attack-cycle.outputs.round }}] Adversarial Attack Samples"
          body-path: /tmp/pr_body.md
          labels: |
            adversarial-attack
            round-${{ needs.agent-attack-cycle.outputs.round }}
          draft: false
          add-paths: |
            results/round_${{ needs.agent-attack-cycle.outputs.round }}_samples.json
            results/scorecard.html
            agent_traces/
