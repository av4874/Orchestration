name: Adversarial Attack Generation

on:
  push:
    branches:
      - 'attacks/**'
  workflow_dispatch:
    inputs:
      round:
        description: 'Round number (leave blank for auto)'
        required: false
        default: ''

jobs:
  agent-attack-cycle:
    name: Run Red + Blue Team Agents
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine round number
        id: set-round
        run: |
          if [ -n "${{ github.event.inputs.round }}" ]; then
            ROUND="${{ github.event.inputs.round }}"
          else
            ROUND=$(python -c "
          import json, os
          mem_path = 'pipeline/attack_memory.json'
          if os.path.exists(mem_path):
              m = json.load(open(mem_path))
              ROUND = len(m.get('rounds', [])) + 1
          else:
              ROUND = 1
          print(ROUND)
          ")
          fi
          echo "round=$ROUND" >> $GITHUB_OUTPUT
          echo "Round: $ROUND"

      - name: Run Red Team Agent
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADVERSARIAL_DATASET: Builder117/enterprise-adversarial-samples
          ENTERPRISE_ROOT: ${{ github.workspace }}
        run: python agents/red_team_agent.py --round ${{ steps.set-round.outputs.round }} --dry-run

      - name: Run Blue Team Agent
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADVERSARIAL_DATASET: Builder117/enterprise-adversarial-samples
          ENTERPRISE_ROOT: ${{ github.workspace }}
        run: python agents/blue_team_agent.py --round ${{ steps.set-round.outputs.round }} --dry-run

      - name: Validate attack sample schema
        run: |
          python -c "
          import json, sys, os
          round_num = ${{ steps.set-round.outputs.round }}
          samples_path = f'results/round_{round_num}_samples.json'
          if not os.path.exists(samples_path):
              print(f'ERROR: {samples_path} not found')
              sys.exit(1)
          samples = json.load(open(samples_path))
          required = {'id', 'detector', 'prompt', 'attack_family', 'expected_evasion'}
          valid_detectors = {'injection','jailbreak','insecure_output','indirect_injection'}
          for s in samples:
              missing = required - s.keys()
              if missing:
                  print(f'ERROR: sample missing fields {missing}')
                  sys.exit(1)
              if s['detector'] not in valid_detectors:
                  print(f'ERROR: invalid detector {s[\"detector\"]}')
                  sys.exit(1)
          families = list(set(s['attack_family'] for s in samples))
          print(f'VALID: {samples_path} ({len(samples)} samples, families: {families})')
          "

      - name: Generate scorecard
        continue-on-error: true
        env:
          ENTERPRISE_ROOT: ${{ github.workspace }}
        run: |
          python reporting/scorecard.py \
            --round ${{ steps.set-round.outputs.round }} \
            --output results/scorecard.html

      - name: Commit and push artifacts to samples branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROUND: ${{ steps.set-round.outputs.round }}
        run: |
          BRANCH="attacks/round-${ROUND}-samples"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"

          git add --force \
            results/round_${ROUND}_samples.json \
            agent_traces/ \
            agent_workspace/ \
            || true
          git add --force results/scorecard.html 2>/dev/null || true

          git diff --cached --quiet && echo "Nothing to commit" && exit 0

          git commit -m "chore: round-${ROUND} attack samples [dry-run]"
          git push origin "$BRANCH" --force

      - name: Open Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROUND: ${{ steps.set-round.outputs.round }}
        run: |
          BRANCH="attacks/round-${ROUND}-samples"
          EXISTING=$(gh pr list --head "$BRANCH" --base master --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already exists for $BRANCH"
            exit 0
          fi
          printf 'Round %s dry-run complete. Artifacts: results/round_%s_samples.json, agent_traces/. Merge to master for Jenkins Phase 2.' "$ROUND" "$ROUND" > /tmp/pr_body.md
          gh pr create \
            --head "$BRANCH" \
            --base master \
            --title "[Round ${ROUND}] Adversarial Attack Samples" \
            --body-file /tmp/pr_body.md
