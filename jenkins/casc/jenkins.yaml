---
# Jenkins Configuration as Code (JCasC)
# Mount this file at: /var/jenkins_home/casc_configs/jenkins.yaml
# Set env var: CASC_JENKINS_CONFIG=/var/jenkins_home/casc_configs/

jenkins:
  systemMessage: "Adversarial Guardrail CI/CD Pipeline"
  numExecutors: 0   # controller runs no jobs — all work in K8s pods
  mode: EXCLUSIVE
  scmCheckoutRetryCount: 2

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  clouds:
    - kubernetes:
        name: "gke-cluster"
        serverUrl: ""          # empty = auto-detect from in-cluster service account
        namespace: "jenkins"
        jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local"
        jenkinsTunnel: "jenkins.jenkins.svc.cluster.local:50000"
        connectTimeout: 5
        readTimeout: 15
        containerCapStr: "10"
        podLabels:
          - key: "jenkins"
            value: "agent"
        templates:
          - name: "python-agent"
            namespace: "jenkins"
            label: "python-agent"
            yamlFile: "jenkins/k8s/agent-pod-template.yaml"
            idleMinutes: 0
            activeDeadlineSeconds: 3600
            serviceAccount: "jenkins"

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "hf-token"
              description: "Hugging Face API token"
              secret: "${HF_TOKEN}"
          - string:
              scope: GLOBAL
              id: "github-token"
              description: "GitHub personal access token"
              secret: "${GITHUB_TOKEN}"
          - string:
              scope: GLOBAL
              id: "github-repo"
              description: "GitHub repo (owner/repo)"
              secret: "${GITHUB_REPO}"
          - string:
              scope: GLOBAL
              id: "argo-token"
              description: "Argo Workflows bearer token"
              secret: "${ARGO_TOKEN}"

jobs:
  - script: |
      pipelineJob('adversarial-guardrail') {
        description('Adversarial Guardrail — AI Agent Orchestration Pipeline')
        keepDependencies(false)
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url("https://github.com/${System.getenv('GITHUB_REPO')}.git")
                  credentials("github-token")
                }
                branch("*/main")
              }
            }
            scriptPath('Jenkinsfile')
            lightweight(true)
          }
        }
        triggers {
          githubPush()
        }
        parameters {
          stringParam('ROUND', '1', 'Attack round number')
        }
      }

unclassified:
  githubPluginConfig:
    configs:
      - name: "GitHub"
        apiUrl: "https://api.github.com"
        credentialsId: "github-token"
        manageHooks: true
  location:
    url: "http://${JENKINS_EXTERNAL_IP}/"
    adminAddress: "amatullahvak@gmail.com"
  timestamper:
    allPipelines: true
