apiVersion: v1
kind: Pod
metadata:
  labels:
    app: jenkins-agent
spec:
  serviceAccountName: jenkins
  containers:
    - name: python
      image: python:3.12-slim
      command: ["cat"]
      tty: true
      resources:
        requests:
          memory: "2Gi"
          cpu: "1"
        limits:
          memory: "4Gi"
          cpu: "2"
      env:
        - name: PHISHING_PROJECT_PATH
          value: /workspace/phshing-email
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTHONPATH
          value: /workspace/site-packages
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: pipeline-secrets
              key: hf-token
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: pipeline-secrets
              key: github-token
        - name: GITHUB_REPO
          valueFrom:
            secretKeyRef:
              name: pipeline-secrets
              key: github-repo
        - name: ARGO_URL
          valueFrom:
            secretKeyRef:
              name: pipeline-secrets
              key: argo-url
      volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: model-cache
          mountPath: /root/.cache
  initContainers:
    - name: install-deps
      image: python:3.12-slim
      command: ["/bin/sh", "-c"]
      args:
        - |
          pip install --no-cache-dir --target /workspace/site-packages \
            langchain langchain-huggingface huggingface_hub \
            langgraph>=0.1.0 \
            kaggle>=2.2.0 \
            scikit-learn xgboost joblib numpy pandas scipy \
            beautifulsoup4 fastapi uvicorn pydantic \
            jsonschema PyYAML pytest pytest-mock jinja2 requests \
            transformers torch --extra-index-url https://download.pytorch.org/whl/cpu
      volumeMounts:
        - name: workspace
          mountPath: /workspace
  volumes:
    - name: workspace
      emptyDir: {}
    - name: model-cache
      emptyDir: {}
