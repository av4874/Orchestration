# K8s Secret — fill in base64-encoded values then apply
# Encode: echo -n "your-value" | base64
# Apply:  kubectl apply -f pipeline-secrets-template.yaml
#
# DO NOT commit this file with real values — keep in .gitignore

apiVersion: v1
kind: Secret
metadata:
  name: pipeline-secrets
  namespace: jenkins
type: Opaque
data:
  # echo -n "hf_YOUR_TOKEN" | base64
  hf-token: REPLACE_BASE64

  # echo -n "ghp_YOUR_TOKEN" | base64
  github-token: REPLACE_BASE64

  # echo -n "owner/repo-name" | base64
  github-repo: REPLACE_BASE64

  # Argo Workflows bearer token — get after Argo install:
  # kubectl -n argo exec deploy/argo-server -- argo auth token | base64
  argo-token: REPLACE_BASE64

  # Argo server URL — usually http://argo-server.argo.svc.cluster.local:2746
  # echo -n "http://argo-server.argo.svc.cluster.local:2746" | base64
  argo-url: REPLACE_BASE64

  # Staging service URL — points to siem/app.py deployed via staging-deployment.yaml
  # echo -n "http://guardrail-staging.jenkins.svc.cluster.local:7860" | base64
  staging-url: REPLACE_BASE64

  # Jenkins admin password
  # echo -n "your-admin-password" | base64
  jenkins-admin-password: REPLACE_BASE64

---
# Separate secret for argo namespace (Argo workflows read from this namespace)
apiVersion: v1
kind: Secret
metadata:
  name: pipeline-secrets
  namespace: argo
type: Opaque
data:
  github-token: REPLACE_BASE64
  github-repo: REPLACE_BASE64
  staging-url: REPLACE_BASE64
